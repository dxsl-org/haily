id: python-fix-test
language: python
kind: fix-failing-test
description: "pytest fails: calc.factorial returns the wrong value because of a wrong base case. Fix calc.py so all tests in test_calc.py pass. Do not change the tests."
gate: pytest -q
max_tool_calls: 25
max_escalations: 0
timeout_seconds: 120
invariants:
  - "no writes outside the workspace root"
  - "test_calc.py is unchanged"
