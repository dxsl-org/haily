{
  "id": "ops-delete-approval",
  "domain": "Operations",
  "description": "Permanently delete the duplicate contact record 'Carol Dup' created in error; leave the genuine record alone.",
  "seed_state": [
    { "model": "res.partner", "ref": "carol", "fields": { "name": "Carol Dup" } },
    { "model": "res.partner", "ref": "dave", "fields": { "name": "Dave Real" } }
  ],
  "steps": [
    { "tool": "odoo_contact_delete", "params": { "ids": [1000] } }
