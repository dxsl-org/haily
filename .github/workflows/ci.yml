name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust — clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri links the GTK/WebKit -sys crates, so src-tauri needs these dev
      # headers to compile even under `cargo clippy`/`cargo test`.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf

      # tauri-build validates `frontendDist` (../build) at compile time, so the
      # SvelteKit output must exist before any cargo command touches src-tauri.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Build frontend
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  frontend:
    name: Frontend — build + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: npm audit (fail on high or critical)
        run: npm audit --audit-level=high

  audit:
    name: Rust — security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Reads ignore list from .cargo/audit.toml.
      - name: cargo audit
        run: cargo audit
