name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly + manual trigger for the (slow, cold-start-heavy) Odoo golden job below.
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust — clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri links the GTK/WebKit -sys crates, so src-tauri needs these dev
      # headers to compile even under `cargo clippy`/`cargo test`.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf

      # tauri-build validates `frontendDist` (../build) at compile time, so the
      # SvelteKit output must exist before any cargo command touches src-tauri.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Build frontend
        run: |
          npm ci
          npm run build
      # Mobile Thin-Client plan phase 3 (M6): the separate build MODE producing `build-mobile/`
      # — `src-tauri-mobile`'s own `cargo check` below validates `frontendDist` at compile time
      # (tauri-build), exactly like the desktop step above, so this must exist first too.
      - name: Build frontend (mobile target)
        run: npm run build:mobile

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      # The workspace run above unifies features across members, which can MASK a
      # lint that only fires under a crate's own default feature set (e.g. a
      # `needless_update` that's needless without the `llama` feature but needed with
      # it). Re-run clippy per crate so those feature-combo lints can't slip through.
      - name: Clippy (per-crate, no feature unification)
        run: |
          for crate in haily-types haily-db haily-llm haily-io haily-kms \
                       haily-tools haily-core haily-app haily-proactive haily-cli \
                       haily-mobile-client; do
            echo "::group::clippy -p $crate"
            cargo clippy -p "$crate" --all-targets -- -D warnings
            echo "::endgroup::"
          done
      # Guard the CPU-only (no embedded llama.cpp) build path — the unified config
      # loader must stay compilable with the llama feature off.
      - name: Clippy (haily-app, no default features)
        run: cargo clippy -p haily-app --no-default-features --all-targets -- -D warnings
      # The `telegram` adapter is feature-gated, so a workspace build with default
      # features never compiles it — a `ResponseChunk` field change (e.g. the M8
      # `origin` field) could break the telegram destructure silently. Build with the
      # feature on so that path stays green.
      - name: Build (telegram feature)
        run: cargo build -p haily-cli --features telegram
      # Mobile Thin-Client plan phase 2a: `mobile-server` is likewise feature-gated (axum WS
      # server, off by default) — build and clippy it explicitly, plus the combo with
      # `telegram` (red team C2/M15), so a shared enum change (e.g. `Notification`) can't
      # silently break either adapter's exhaustive match.
      - name: Clippy (haily-io, mobile-server feature)
        run: cargo clippy -p haily-io --features mobile-server --all-targets -- -D warnings
      - name: Build (mobile-server feature)
        run: cargo build -p haily-cli --features mobile-server
      - name: Check (mobile-server + telegram combo)
        run: cargo check -p haily-io --features "mobile-server telegram"
      - name: Test (haily-io, mobile-server feature)
        run: cargo test -p haily-io --features mobile-server
      - name: Test (haily-mobile-client)
        run: cargo test -p haily-mobile-client
      - name: Test
        run: cargo test --workspace
      # Mobile Thin-Client plan phase 3 (C2): `src-tauri-mobile` is its OWN Cargo workspace,
      # deliberately excluded from the root one (see root `Cargo.toml`'s `exclude` list) — this
      # is a plain HOST-TARGET `cargo check` (no Android NDK on this runner), proving the Tauri
      # shell's Rust side still type-checks against `haily-mobile-client` + the mobile
      # `frontendDist`, without ever entering the main workspace's dependency graph.
      - name: Check (src-tauri-mobile, host target)
        working-directory: src-tauri-mobile
        run: cargo check
      # M14: static guard that the mobile WebView never grows its own socket/remote-fetch call.
      - name: Mobile CSP grep-guard (no WebSocket/remote fetch under src/routes/mobile)
        run: bash scripts/check-mobile-no-websocket.sh

  frontend:
    name: Frontend — build + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Build (mobile target)
        run: npm run build:mobile
      - name: npm audit (fail on high or critical)
        run: npm audit --audit-level=high

  audit:
    name: Rust — security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Reads ignore list from .cargo/audit.toml.
      - name: cargo audit
        run: cargo audit

  # NON-BLOCKING Odoo golden job (Safe Operator Harness phase 5, R3 e2e proof). Runs on the
  # nightly schedule OR manual dispatch — NOT on push/PR — because the odoo:18.0 cold start
  # (image pull + module install + DB init) is 30-90s and not yet benchmarked. It never gates
  # the main `rust` build: `continue-on-error: true` + the schedule/dispatch condition. The
  # env-gated golden tests SKIP everywhere else (HAILY_ODOO_URL unset), so the normal
  # `cargo test --workspace` in the `rust` job stays fast and Docker-free.
  odoo-golden:
    name: Odoo golden (nightly, non-blocking)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Start Odoo + Postgres sandbox
        run: docker compose -f docker/odoo-ci-compose.yml up -d

      # Bootstrap polls an AUTHENTICATED RPC readiness probe (not just pg_isready), creates a
      # scoped service user, generates an API key, masks it (::add-mask::), and exports
      # HAILY_ODOO_URL/DB/UID/API_KEY to $GITHUB_ENV for the test step below.
      - name: Bootstrap Odoo (readiness + scoped key)
        run: bash scripts/odoo-ci-bootstrap.sh

      # Only the gated golden tests — HAILY_ODOO_URL is now set, so they run against the
      # sandbox. --test odoo_golden keeps this focused (the rest of the suite ran in `rust`).
      - name: Run Odoo golden tests
        run: cargo test -p haily-tools --test odoo_golden -- --nocapture

      - name: Tear down sandbox
        if: always()
        run: docker compose -f docker/odoo-ci-compose.yml down -v
